<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Templates</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <style>
        body { padding-top: 70px; }
        .sidebar { width: 200px; position: fixed; top: 0; left: 0; height: 100%; background: #f8f9fa; padding-top: 60px; }
        .content { margin-left: 210px; }
        .brand { text-align: center; font-size: 24px; font-weight: bold; padding: 15px 0; }
        .template-card { margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="brand">Your Brand</div>
    <div class="list-group">
        <a href="/dashboard" class="list-group-item list-group-item-action">Back to Dashboard</a>
        <a href="#" class="list-group-item list-group-item-action active">Manage Templates</a>
    </div>
</div>

<!-- Content -->
<div class="content container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Templates</h3>
        <div>Logged in as: {{ username }}</div>
    </div>

    <!-- Add Template -->
    <div class="card mb-3">
        <div class="card-body">
            <form id="template-form">
                <div class="mb-2">
                    <input type="text" name="name" class="form-control" placeholder="Template Name" required>
                </div>
                <div class="mb-2">
                    <textarea name="message" class="form-control" placeholder="Message" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Template</button>
            </form>
        </div>
    </div>

    <!-- Search -->
    <div class="mb-3">
        <input type="text" id="search-input" class="form-control" placeholder="Search templates by name...">
    </div>

    <!-- Templates List -->
    <div id="templates-list">
        {% for template in templates %}
            <div class="template-card" data-id="{{ template.id }}">
                <strong>{{ template.name }}</strong>
                <p>{{ template.message }}</p>
                <button class="btn btn-sm btn-warning update-btn">Update</button>
                <button class="btn btn-sm btn-danger delete-btn">Delete</button>
            </div>
        {% endfor %}
    </div>
</div>

<script>
$(document).ready(function(){

    // Add template via AJAX
    $('#template-form').submit(function(e){
        e.preventDefault();
        $.post("/templates/add", $(this).serialize(), function(){
            loadTemplates(); // reload templates
            $('#template-form')[0].reset();
        });
    });

    // Search templates dynamically
    $('#search-input').on('input', function(){
        loadTemplates($(this).val());
    });

    // Delete template
    $(document).on('click', '.delete-btn', function(){
        const id = $(this).closest('.template-card').data('id');
        $.get(`/templates/delete/${id}`, function(){
            loadTemplates();
        });
    });

    // Update template
    $(document).on('click', '.update-btn', function(){
        const card = $(this).closest('.template-card');
        const id = card.data('id');
        const name = prompt("Update template name:", card.find('strong').text());
        const message = prompt("Update template message:", card.find('p').text());
        if(name && message){
            $.post(`/templates/update/${id}`, {name:name, message:message}, function(){
                loadTemplates();
            });
        }
    });

    // Load templates
    function loadTemplates(search=""){
        $.get("/templates", {search: search}, function(data){
            const html = $(data).find('#templates-list').html();
            $('#templates-list').html(html);
        });
    }

});
</script>

</body>
</html>
