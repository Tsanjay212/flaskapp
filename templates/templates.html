<!DOCTYPE html>
<html>
<head>
<title>Templates</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:8px; }
input, textarea { width:100%; padding:8px; margin:5px 0; }
button { padding:8px 12px; background:#2563eb; color:white; border:none; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:10px; border-bottom:1px solid #ddd; }
a { color:red; text-decoration:none; }
.top-bar { display:flex; justify-content:space-between; align-items:center; }
</style>
</head>

<body>

<div class="top-bar">
    <h2>SMS Templates</h2>
    <a href="{{ url_for('dashboard') }}">⬅ Back to Dashboard</a>
</div>

<!-- SEARCH -->
<div class="card">
    <form method="GET">
        <input type="text" name="search" placeholder="Search by template name..." value="{{ search }}">
        <button type="submit">Search</button>
    </form>
</div>

<!-- CREATE -->
<div class="card">
    <h3>Create Template</h3>
    <form method="POST" action="{{ url_for('add_template') }}">
        <input type="text" name="name" placeholder="Template Name" required>
        <textarea name="message" placeholder="Message" required></textarea>
        <button type="submit">Save</button>
    </form>
</div>

<!-- LIST -->
<div class="card">
    <h3>Saved Templates</h3>

    {% if templates %}
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Message</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for t in templates %}
            <tr>
                <td>{{ t.name }}</td>
                <td>{{ t.message }}</td>
                <td>{{ t.created_at }}</td>
                <td>
                    <!-- UPDATE -->
                    <form method="POST" action="{{ url_for('update_template', id=t.id) }}">
                        <input type="text" name="name" value="{{ t.name }}">
                        <textarea name="message">{{ t.message }}</textarea>
                        <button type="submit">Update</button>
                    </form>

                    <!-- DELETE -->
                    <a href="{{ url_for('delete_template', id=t.id) }}" 
                       onclick="return confirm('Delete template?')">
                       Delete
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No templates found</p>
    {% endif %}
</div>

</body>
</html>
