<!-- admin_credits.html -->
{% extends "base.html" %}

{% block content %}
<h2>Manage User Credits</h2>
<form method="POST">
    <label for="user_id">User</label>
    <select name="user_id" id="user_id">
        {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }} - {{ user.credits }} credits</option>
        {% endfor %}
    </select><br><br>

    <label for="action">Action</label>
    <select name="action" id="action">
        <option value="add">Add Credits</option>
        <option value="update">Update Credits</option>
        <option value="delete">Delete Credits</option>
    </select><br><br>

    <label for="amount">Amount</label>
    <input type="number" name="amount" id="amount" required><br><br>

    <button type="submit">Submit</button>
</form>
{% endblock %}
