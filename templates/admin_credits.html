<!-- /opt/flaskapp/templates/admin_credits.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Credit Management</title>
</head>
<body>
    <h1>Credit Management</h1>
    <form action="{{ url_for('admin_add_credits') }}" method="POST">
        <label for="username">Username:</label>
        <input type="text" name="username" required><br><br>
        <label for="amount">Amount:</label>
        <input type="number" name="amount" required><br><br>
        <button type="submit">Add Credits</button>
    </form>

    <h2>Set User Credits</h2>
    <form action="{{ url_for('admin_set_credits') }}" method="POST">
        <label for="username">Username:</label>
        <input type="text" name="username" required><br><br>
        <label for="amount">Amount:</label>
        <input type="number" name="amount" required><br><br>
        <button type="submit">Set Credits</button>
    </form>
</body>
</html>
