<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Credits Panel</title>

<style>
body{font-family:Segoe UI;background:#f4f5f7;margin:0;}

header{
    background:#1f2937;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    padding:40px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#1d4ed8;
}

.logout{
    background:red;
    padding:8px 12px;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h3>💰 Admin Credits Panel</h3>
    <form action="/logout">
        <button class="logout">Logout</button>
    </form>
</header>

<div class="container">

<div class="card">
    <h3>Update User Credits</h3>

    <form method="POST" action="/admin/update-credits">

        <label>User ID</label>
        <input name="user_id" required placeholder="Enter User ID">

        <label>Credits</label>
        <input name="credits" required placeholder="Enter Credits">

        <label>Action</label>
        <select name="action">
            <option value="set">Set</option>
            <option value="add">Add</option>
        </select>

        <button type="submit">Update Credits</button>

    </form>
</div>

</div>

</body>
</html>
