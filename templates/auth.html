<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SanReach - SMS Platform</title>
<style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #ff4d4d, #1e3aff, #00c6ff);
        color: #fff;
    }

    .container {
        width: 200%;
        max-width: 400px;
        padding: 10px;
    }

    /* Brand/Header */
    .brand {
        text-align: center;
        margin-bottom: 30px;
    }

    .brand span {
        font-size: 100px;
        display: block;
        margin-bottom: 10px;
    }

    .brand h1 {
        font-size: 30px;
        font-weight: bold;
        color: #fff;
    }

    .tagline {
        font-size: 18px;
        color: #ffffffcc;
        margin-top: 5px;
    }

    /* Auth Card */
    .auth-card {
        background: rgba(255,255,255,0.95);
        padding: 30px 30px;
        border-radius: 30px;
        box-shadow: 0 7px 25px rgba(0,0,0,0.15);
        color: #0c4a6e;
    }

    .auth-card h2 {
        text-align: center;
        margin-bottom: 40px;
    }

    .message {
        text-align: center;
        color: #ef4444;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    input {
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14,165,233,0.3);
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #0ea5e9;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover { background: #0284c7; }

    .toggle {
        text-align: center;
        margin-top: 12px;
        font-size: 14px;
    }

    .toggle a {
        color: #0ea5e9;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
    }

    /* Responsive */
    @media(max-width: 500px) {
        .container { padding: 15px; }
    }

</style>
</head>
<body>

<div class="container">

    <!-- Brand/Header -->
    <div class="brand">
        <span>🚀📩</span>
        <h1>SanReach</h1>
        <div class="tagline">Fast & Reliable SMS Platform</div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
        <h2 id="formTitle">Login</h2>
        <div class="message" id="msg">Invalid username/password</div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="#">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" method="POST" action="#" style="display:none;">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div class="toggle">
            <span id="toggleText">
                Don’t have an account? <a onclick="toggleForms()">Register</a>
            </span>
        </div>
    </div>

</div>

<script>
function toggleForms() {
    const login = document.getElementById("loginForm");
    const register = document.getElementById("registerForm");
    const title = document.getElementById("formTitle");
    const toggleText = document.getElementById("toggleText");

    if (login.style.display === "none") {
        login.style.display = "flex";
        register.style.display = "none";
        title.innerText = "Login";
        toggleText.innerHTML = "Don’t have an account? <a onclick='toggleForms()'>Register</a>";
    } else {
        login.style.display = "none";
        register.style.display = "flex";
        title.innerText = "Create Account";
        toggleText.innerHTML = "Already have an account? <a onclick='toggleForms()'>Login</a>";
    }
}
</script>

</body>
</html>
